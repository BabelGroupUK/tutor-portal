<!DOCTYPE html>
<html>
<head>
  <title>Babel Tutor Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1, h2 {
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      vertical-align: top;
      height: 60px;
    }

    th {
      background-color: #f2f2f2;
    }

    .cell {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      text-align: center;
    }

    .section {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>Babel Tutor Portal</h1>

  <h2>Weekly Schedule</h2>

  <table>
    <tr>
      <th>Time</th>
      <th>Monday</th>
      <th>Tuesday</th>
      <th>Wednesday</th>
      <th>Thursday</th>
      <th>Friday</th>
    </tr>

    <tr>
      <td>9–10</td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
    </tr>

    <tr>
      <td>10–11</td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
      <td><input class="cell"></td>
    </tr>
  </table>

  <div class="section">
    <h2>Upload Documents</h2>
    <p>We will add invoice upload next.</p>
  </div>

</body>
</html>
